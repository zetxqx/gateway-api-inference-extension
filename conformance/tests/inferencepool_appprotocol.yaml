apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-for-inferencepool-appprotocol-h2c
  namespace: inference-conformance-app-backend
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: conformance-primary
    namespace: inference-conformance-infra
    sectionName: http
  hostnames:
  - "appprotocol-h2c.example.com"
  rules:
  - backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: appprotocol-h2c-inference-pool
    matches:
    - path:
        type: PathPrefix
        value: /inferencepool-app-protocol-h2c
---
apiVersion: gateway.networking.k8s.io/v1
